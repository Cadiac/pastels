<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

         and declare the page light so Safari doesn't darken its chrome around it. -->
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#f3ebd5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#f3ebd5" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f3ebd5" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>"
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Pastels" />
    <title>Pastels</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
