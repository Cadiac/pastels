# nginx site for pastels.cadi.ac — reverse-proxies to the Node app on localhost.
# Copy to /etc/nginx/sites-available/pastels.cadi.ac and symlink into sites-enabled,
# then run `certbot --nginx -d pastels.cadi.ac` to add the :443 TLS block + redirect.
server {
    listen 80;
    listen [::]:80;
    server_name pastels.cadi.ac;

    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
